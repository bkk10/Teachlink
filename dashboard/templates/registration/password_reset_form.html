{% extends "dashboard/base.html" %}

{% block title %}Reset Password - TeachLink{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-100">
    <div class="bg-white p-8 rounded-lg shadow-lg max-w-md w-full">
        <h2 class="text-2xl font-bold text-gray-900 mb-2">Reset your password</h2>
        <p class="text-gray-600 mb-6">Enter your account email and we will send a reset link.</p>
        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                <input type="email" name="email" required class="w-full px-3 py-2 border border-gray-300 rounded-md">
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700">
                Send reset link
            </button>
        </form>
        <div class="mt-4 text-center text-sm">
            <a href="{% url 'custom_login' %}" class="text-blue-600 hover:underline">Back to login</a>
        </div>
    </div>
</div>
{% endblock %}
