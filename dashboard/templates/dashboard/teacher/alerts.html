{% extends "dashboard/base.html" %}
{% load static %}

{% block title %}Alerts Center{% endblock %}

{% block content %}
<div class="space-y-6">
    <!-- Header -->
    <div class="flex flex-col lg:flex-row lg:justify-between lg:items-center gap-3">
        <div>
            <h1 class="text-2xl font-bold text-gray-900">
                <i class="fas fa-bell text-yellow-500 mr-2"></i>
                Risk Alerts Center
            </h1>
            <p class="text-sm text-gray-500">Payment reminders are managed in the Payments section.</p>
        </div>
        <div class="flex flex-wrap gap-2">
            <select id="statusFilter" class="border border-gray-300 rounded-md px-3 py-2 text-sm">
                <option value="ACTIVE,ACKNOWLEDGED">Active Alerts</option>
                <option value="ACTIVE">Active Only</option>
                <option value="ACKNOWLEDGED">Acknowledged</option>
                <option value="RESOLVED">Resolved</option>
                <option value="ALL">All Alerts</option>
            </select>
            <select id="severityFilter" class="border border-gray-300 rounded-md px-3 py-2 text-sm">
                <option value="">All Severities</option>
                <option value="CRITICAL">Critical</option>
                <option value="HIGH">High</option>
                <option value="MEDIUM">Medium</option>
                <option value="LOW">Low</option>
            </select>
            <select id="typeFilter" class="border border-gray-300 rounded-md px-3 py-2 text-sm">
                <option value="">All Alert Types</option>
                <option value="DROPOUT">Dropout Risk</option>
                <option value="DISENGAGEMENT">Disengagement</option>
                <option value="PERFORMANCE_DROP">Performance Drop</option>
                <option value="MULTIPLE_FAILURES">Multiple Failures</option>
                <option value="BEHIND_SCHEDULE">Behind Schedule</option>
            </select>
            <select id="courseFilter" class="border border-gray-300 rounded-md px-3 py-2 text-sm">
                <option value="">All Courses</option>
                {% for course in courses %}
                <option value="{{ course.id }}">{{ course.title }}</option>
                {% endfor %}
            </select>
            <button id="refreshBtn" class="bg-white border border-gray-300 rounded-md px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50">
                <i class="fas fa-sync-alt mr-2"></i>Refresh
            </button>
        </div>
    </div>
    
    <!-- Alerts Summary -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4" id="summaryCards">
        <!-- Populated by JS -->
    </div>
    
    <!-- Alerts List -->
    <div class="bg-white rounded-lg shadow overflow-hidden">
        <div class="px-6 py-4 border-b border-gray-200">
            <h2 class="text-lg font-medium text-gray-900">Alert History</h2>
        </div>
        <div id="alertsContainer">
            <!-- Populated by JS -->
            <div class="p-6 text-center text-gray-500">
                <i class="fas fa-spinner fa-spin mr-2"></i>Loading alerts...
            </div>
        </div>
        
        <!-- Pagination -->
        <div class="px-6 py-4 border-t border-gray-200 flex items-center justify-between">
            <div class="text-sm text-gray-700" id="paginationInfo"></div>
            <div class="flex space-x-2">
                <button id="prevPage" class="px-3 py-1 border rounded-md text-sm disabled:opacity-50" disabled>
                    Previous
                </button>
                <button id="nextPage" class="px-3 py-1 border rounded-md text-sm">
                    Next
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Alert Action Modal -->
<div id="actionModal" class="fixed inset-0 bg-gray-500 bg-opacity-75 hidden flex items-center justify-center z-50">
    <div class="bg-white rounded-lg max-w-md w-full mx-4">
        <div class="px-6 py-4 border-b border-gray-200">
            <h3 class="text-lg font-medium text-gray-900" id="modalTitle">Take Action</h3>
        </div>
        <div class="px-6 py-4">
            <p class="text-sm text-gray-600 mb-4" id="modalMessage"></p>
            <div id="modalForm">
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Intervention Notes / Outcome
                </label>
                <textarea id="interventionNotes" rows="3" class="w-full border border-gray-300 rounded-md px-3 py-2"></textarea>
            </div>
        </div>
        <div class="px-6 py-4 border-t border-gray-200 flex justify-end space-x-3">
            <button id="cancelModal" class="px-4 py-2 border rounded-md text-sm text-gray-700 hover:bg-gray-50">
                Cancel
            </button>
            <button id="confirmAction" class="px-4 py-2 bg-blue-600 text-white rounded-md text-sm hover:bg-blue-700">
                Confirm
            </button>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    let currentPage = 0;
    let totalAlerts = 0;
    let limit = 20;
    let currentAlertId = null;
    let currentAction = null;
    
    $(document).ready(function() {
        loadAlerts();
        
        $('#refreshBtn').click(function() {
            $(this).find('i').addClass('fa-spin');
            loadAlerts();
        });
        
        $('#statusFilter, #severityFilter, #typeFilter, #courseFilter').change(function() {
            currentPage = 0;
            loadAlerts();
        });
        
        $('#prevPage').click(function() {
            if (currentPage > 0) {
                currentPage--;
                loadAlerts();
            }
        });
        
        $('#nextPage').click(function() {
            if ((currentPage + 1) * limit < totalAlerts) {
                currentPage++;
                loadAlerts();
            }
        });
        
        // Modal handlers
        $('#cancelModal').click(function() {
            $('#actionModal').addClass('hidden');
        });
        
        $('#confirmAction').click(function() {
            takeAction();
        });
    });
    
    function loadAlerts() {
        const status = $('#statusFilter').val();
        const severity = $('#severityFilter').val();
        const alertType = $('#typeFilter').val();
        const courseId = $('#courseFilter').val();
        
        let url = `/api/dashboard/alerts/?limit=${limit}&offset=${currentPage * limit}`;
        if (status && status !== 'ALL') {
            url += `&status=${status}`;
        }
        if (severity) {
            url += `&severity=${severity}`;
        }
        if (alertType) {
            url += `&type=${alertType}`;
        }
        if (courseId) {
            url += `&course_id=${courseId}`;
        }
        
        $.ajax({
            url: url,
            method: 'GET',
            success: function(data) {
                totalAlerts = data.total;
                displayAlerts(data.alerts);
                updatePagination();
                updateSummary(data.summary);
                $('#refreshBtn i').removeClass('fa-spin');
            },
            error: function(xhr) {
                $('#alertsContainer').html(`
                    <div class="p-6 text-center text-red-500">
                        <i class="fas fa-exclamation-circle mr-2"></i>
                        Failed to load alerts (status ${xhr.status})
                    </div>
                `);
                $('#refreshBtn i').removeClass('fa-spin');
            }
        });
    }
    
    function displayAlerts(alerts) {
        if (alerts.length === 0) {
            $('#alertsContainer').html(`
                <div class="p-6 text-center text-gray-500">
                    <i class="fas fa-check-circle text-green-500 text-3xl mb-3"></i>
                    <p>No alerts found matching your criteria</p>
                </div>
            `);
            return;
        }
        
        let html = '<div class="divide-y divide-gray-200">';
        
        alerts.forEach(alert => {
            const severityClass = {
                'CRITICAL': 'bg-red-100 text-red-800 border-red-200',
                'HIGH': 'bg-orange-100 text-orange-800 border-orange-200',
                'MEDIUM': 'bg-yellow-100 text-yellow-800 border-yellow-200',
                'LOW': 'bg-blue-100 text-blue-800 border-blue-200',
                'INFO': 'bg-gray-100 text-gray-800 border-gray-200'
            }[alert.severity] || 'bg-gray-100 text-gray-800 border-gray-200';
            
            const statusClass = {
                'ACTIVE': 'bg-red-100 text-red-800',
                'ACKNOWLEDGED': 'bg-yellow-100 text-yellow-800',
                'RESOLVED': 'bg-green-100 text-green-800',
                'DISMISSED': 'bg-gray-100 text-gray-800',
                'EXPIRED': 'bg-gray-100 text-gray-800'
            }[alert.status] || 'bg-gray-100 text-gray-800';
            
            html += `
                <div class="px-6 py-4 hover:bg-gray-50" data-alert-id="${alert.id}">
                    <div class="flex items-start justify-between">
                        <div class="flex-1">
                            <div class="flex items-center space-x-2 mb-2">
                                <span class="px-2 py-1 text-xs rounded-full ${severityClass} border">
                                    ${alert.severity}
                                </span>
                                <span class="px-2 py-1 text-xs rounded-full ${statusClass}">
                                    ${alert.status}
                                </span>
                                <span class="text-xs text-gray-500">
                                    ${alert.alert_type}
                                </span>
                            </div>
                            
                            <h3 class="text-sm font-medium text-gray-900 mb-1">${alert.title}</h3>
                            <p class="text-sm text-gray-600 mb-2">${alert.message}</p>
                            ${(alert.risk_score !== null || alert.engagement_score !== null || alert.progress_percentage !== null) ? `
                                <div class="mb-2 flex flex-wrap gap-2 text-xs">
                                    ${alert.risk_score !== null ? `<span class="px-2 py-1 bg-red-50 text-red-700 rounded border border-red-100">Risk Score: ${(alert.risk_score * 100).toFixed(1)}%</span>` : ''}
                                    ${alert.engagement_score !== null ? `<span class="px-2 py-1 bg-blue-50 text-blue-700 rounded border border-blue-100">Engagement: ${(alert.engagement_score * 100).toFixed(1)}%</span>` : ''}
                                    ${alert.progress_percentage !== null ? `<span class="px-2 py-1 bg-green-50 text-green-700 rounded border border-green-100">Progress: ${alert.progress_percentage.toFixed(1)}%</span>` : ''}
                                </div>
                            ` : ''}
                             
                            <div class="flex items-center text-xs text-gray-500 space-x-4">
                                <span><i class="fas fa-user mr-1"></i>${alert.student_name}</span>
                                <span><i class="fas fa-book mr-1"></i>${alert.course_title}</span>
                                <span><i class="fas fa-clock mr-1"></i>${new Date(alert.generated_at).toLocaleString()}</span>
                            </div>
                            
                            ${alert.recommendation ? `
                                <div class="mt-2 text-xs text-blue-600 bg-blue-50 p-2 rounded">
                                    <i class="fas fa-lightbulb mr-1"></i>
                                    ${alert.recommendation}
                                </div>
                            ` : ''}
                        </div>
                        
                        <div class="ml-4 flex flex-col space-y-2">
                            ${alert.status === 'ACTIVE' ? `
                                <button onclick="showActionModal('${alert.id}', 'acknowledge')" 
                                        class="text-xs bg-yellow-600 text-white px-3 py-1 rounded hover:bg-yellow-700">
                                    Acknowledge
                                </button>
                                <button onclick="showActionModal('${alert.id}', 'resolve')" 
                                        class="text-xs bg-green-600 text-white px-3 py-1 rounded hover:bg-green-700">
                                    Resolve
                                </button>
                                <button onclick="showActionModal('${alert.id}', 'dismiss')" 
                                        class="text-xs bg-gray-600 text-white px-3 py-1 rounded hover:bg-gray-700">
                                    Dismiss
                                </button>
                            ` : ''}
                            
                            ${alert.status === 'ACKNOWLEDGED' ? `
                                <button onclick="showActionModal('${alert.id}', 'resolve')" 
                                        class="text-xs bg-green-600 text-white px-3 py-1 rounded hover:bg-green-700">
                                    Resolve
                                </button>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `;
        });
        
        html += '</div>';
        $('#alertsContainer').html(html);
    }
    
    function showActionModal(alertId, action) {
        currentAlertId = alertId;
        currentAction = action;
        
        const titles = {
            'acknowledge': 'Acknowledge Alert',
            'resolve': 'Resolve Alert',
            'dismiss': 'Dismiss Alert'
        };
        
        const messages = {
            'acknowledge': 'You are about to acknowledge this alert. This indicates you have seen it and will take action.',
            'resolve': 'You are about to mark this alert as resolved. Please add notes about the intervention and outcome.',
            'dismiss': 'You are about to dismiss this alert. This will remove it from your active alerts.'
        };
        
        $('#modalTitle').text(titles[action]);
        $('#modalMessage').text(messages[action]);
        
        if (action === 'resolve') {
            $('#modalForm').show();
        } else {
            $('#modalForm').hide();
        }
        
        $('#actionModal').removeClass('hidden');
    }
    
    function takeAction() {
        if (!currentAlertId || !currentAction) return;
        
        const data = {
            alert_id: currentAlertId,
            action: currentAction
        };
        
        if (currentAction === 'resolve') {
            data.outcome = $('#interventionNotes').val();
        }
        
        $.ajax({
            url: '/api/dashboard/alerts/',
            method: 'POST',
            headers: {
                'X-CSRFToken': getCookie('csrftoken'),
                'Content-Type': 'application/json'
            },
            data: JSON.stringify(data),
            success: function() {
                $('#actionModal').addClass('hidden');
                loadAlerts();
            },
            error: function() {
                alert('Failed to update alert');
            }
        });
    }

    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }
    
    function updatePagination() {
        if (totalAlerts === 0) {
            $('#paginationInfo').text('No alerts found');
            $('#prevPage').prop('disabled', true);
            $('#nextPage').prop('disabled', true);
            return;
        }

        const start = currentPage * limit + 1;
        const end = Math.min((currentPage + 1) * limit, totalAlerts);
        
        $('#paginationInfo').text(`Showing ${start}-${end} of ${totalAlerts} alerts`);
        
        $('#prevPage').prop('disabled', currentPage === 0);
        $('#nextPage').prop('disabled', (currentPage + 1) * limit >= totalAlerts);
    }
    
    function updateSummary(summary) {
        const counts = (summary && summary.severity_counts) ? summary.severity_counts : {
            'CRITICAL': 0,
            'HIGH': 0,
            'MEDIUM': 0,
            'LOW': 0
        };
        const unresolved = summary ? summary.unresolved || 0 : 0;
        const resolved = summary ? summary.resolved || 0 : 0;
        
        const html = `
            <div class="bg-red-50 rounded-lg p-4 border border-red-200">
                <p class="text-xs text-red-600 font-medium">Critical Severity</p>
                <p class="text-2xl font-bold text-red-700">${counts['CRITICAL']}</p>
                <p class="text-xs text-red-600 mt-1">Filtered total</p>
            </div>
            <div class="bg-orange-50 rounded-lg p-4 border border-orange-200">
                <p class="text-xs text-orange-600 font-medium">High Severity</p>
                <p class="text-2xl font-bold text-orange-700">${counts['HIGH']}</p>
                <p class="text-xs text-orange-600 mt-1">Filtered total</p>
            </div>
            <div class="bg-yellow-50 rounded-lg p-4 border border-yellow-200">
                <p class="text-xs text-yellow-600 font-medium">Medium Severity</p>
                <p class="text-2xl font-bold text-yellow-700">${counts['MEDIUM']}</p>
                <p class="text-xs text-yellow-600 mt-1">Filtered total</p>
            </div>
            <div class="bg-blue-50 rounded-lg p-4 border border-blue-200">
                <p class="text-xs text-blue-600 font-medium">Low Severity</p>
                <p class="text-2xl font-bold text-blue-700">${counts['LOW']}</p>
                <p class="text-xs text-blue-600 mt-1">Filtered total</p>
            </div>
            <div class="bg-gray-50 rounded-lg p-4 border border-gray-200 md:col-span-4">
                <p class="text-xs text-gray-600 font-medium">Status Overview</p>
                <p class="text-sm text-gray-700 mt-1">Unresolved: <span class="font-semibold">${unresolved}</span> | Resolved: <span class="font-semibold">${resolved}</span></p>
            </div>
        `;
        
        $('#summaryCards').html(html);
    }
</script>
{% endblock %}
